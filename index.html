<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POSTPILOT | SYS_FORGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              display: ['Syncopate', 'sans-serif'],
            },
            colors: {
              background: '#050a14',
            }
          },
        },
      }
    </script>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&family=Syncopate:wght@400;700&display=swap');
      
      :root {
        color-scheme: dark;
      }
      
      body {
        margin: 0;
        background-color: #050a14;
        color: #f8fafc;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        height: 100dvh;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .glass-input {
        background: rgba(13, 20, 35, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      .btn-glow {
        box-shadow: 0 0 30px rgba(6, 182, 212, 0.15);
      }
      
      .active-border {
        border-color: #06b6d4;
        box-shadow: inset 0 0 15px rgba(6, 182, 212, 0.1), 0 0 20px rgba(6, 182, 212, 0.1);
      }

      .font-display {
        font-family: 'Syncopate', sans-serif;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
